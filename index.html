<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>youtube clone</title>
</head>
<style>
    * {
        font-family: "YouTube Sans", "YouTube Sans Dark", sans-serif;
        color: #fff;
    }
    
    body {
        background-color: #181818;
    }
    
    .header-navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 0px 20px 0px 20px;
    }
    
    .left-bar {
        width: 300px;
        height: 60px;
        display: flex;
        align-items: center;
        /* justify-content: space-around; */
    }
    
    .logo {
        margin-left: 20px;
    }
    
    .logo svg {
        height: 40px;
        width: 40px;
    }
    
    .left-bar p {
        font-family: "YouTube Sans", YouTube Sans Dark, sans-serif;
        font-weight: 800;
        color: #fff;
        font-size: 20px;
    }
    
    .left-bar sup {
        color: #b3b3b3;
        font-size: 12px;
        margin: 5px;
    }
    
    .center-bar {
        display: flex;
    }
    
    .search-btn {
        width: 80px;
        height: 40px;
        background: #222;
        border: 1px solid #3a3a3a;
        border-left: none;
        border-radius: 0 20px 20px 0;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .search-bar {
        width: 600px;
        height: 36.px;
        background: #222;
        border: 1px solid #3a3a3a;
        border-right: 1px solid #3a3a3a;
        border-radius: 20px 0px 0px 20px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .voice-btn {
        width: 40px;
        height: 40px;
        margin-left: 10px;
        border: none;
        border-radius: 50%;
        background: #272727;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
    }
    
    .voice-btn:hover {
        background: #3a3a3a;
    }
    
    .voice-btn svg {
        width: 22px;
        height: 22px;
    }
    
    .right-bar {
        display: flex;
    }
    
    .icon-btn,
    .profile-btn {
        width: 40px;
        height: 40px;
        border: none;
        border-radius: 50%;
        background: transparent;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
    }
    
    .icon-btn:hover,
    .profile-btn:hover {
        background: #272727;
    }
    
    .icon-btn svg,
    .profile-btn svg {
        width: 24px;
        height: 24px;
    }
    
    .profile-btn {
        overflow: hidden;
    }
    
    .right-bar {
        width: 300px;
        height: 76px;
        display: flex;
        align-items: center;
        justify-content: space-evenly;
    }
    
    .create-icon {
        display: flex;
        align-items: center;
        color: #fff;
    }
</style>

<body>
    <div class="header-navbar">

        <div class="left-bar">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M3 6H21M3 12H21M3 18H21" stroke="white" stroke-width="2" class="menu" stroke-linecap="round"/></svg>
            <div class="logo"><svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="100" height="100" viewBox="0 0 48 48">
<path fill="#FF3D00" d="M43.2,33.9c-0.4,2.1-2.1,3.7-4.2,4c-3.3,0.5-8.8,1.1-15,1.1c-6.1,0-11.6-0.6-15-1.1c-2.1-0.3-3.8-1.9-4.2-4C4.4,31.6,4,28.2,4,24c0-4.2,0.4-7.6,0.8-9.9c0.4-2.1,2.1-3.7,4.2-4C12.3,9.6,17.8,9,24,9c6.2,0,11.6,0.6,15,1.1c2.1,0.3,3.8,1.9,4.2,4c0.4,2.3,0.9,5.7,0.9,9.9C44,28.2,43.6,31.6,43.2,33.9z"></path><path fill="#FFF" d="M20 31L20 17 32 24z"></path>
</svg></div>
            <p>YouTube<sup>IN</sup></p>
        </div>

        <div class="center-bar">
            <input class="search-bar" type="text" id="search" placeholder="Search">
            <button class="search-btn" aria-label="Search">
               <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
             <path d="M10 4a6 6 0 1 1 0 12a6 6 0 0 1 0-12zm0-2a8 8 0 1 0 4.9 14.3l4.4 4.4l1.4-1.4l-4.4-4.4A8 8 0 0 0 10 2z"/>
              </svg>
                      </button>
            <button class="voice-btn" aria-label="Search with voice">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                       <path d="M12 15a3 3 0 0 0 3-3V7a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3Z" fill="currentColor"/>
                <path d="M17 12a1 1 0 1 1 2 0a7 7 0 0 1-6 6.93V21h3a1 1 0 1 1 0 2H8a1 1 0 1 1 0-2h3v-2.07A7 7 0 0 1 5 12a1 1 0 1 1 2 0a5 5 0 0 0 10 0Z" fill="currentColor"/>
               </svg>
              </button>
        </div>

        <div class="right-bar">
            <div class="create-icon">
                <!-- Create icon -->
                <button class="icon-btn" aria-label="Create">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M19 11H13V5a1 1 0 1 0-2 0v6H5a1 1 0 1 0 0 2h6v6a1 1 0 1 0 2 0v-6h6a1 1 0 1 0 0-2Z" fill="currentColor"/>
                 </svg>
                     </button>
                <p>Create</p>
            </div>

            <!-- Bell icon -->
            <button class="icon-btn" aria-label="Notifications">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22Zm7-3h-1V11a6 6 0 1 0-12 0v8H5a1 1 0 1 0 0 2h14a1 1 0 1 0 0-2Zm-3 0H8V11a4 4 0 1 1 8 0v8Z" fill="currentColor"/>
                   </svg>
                </button>

            <!-- Profile avatar icon -->
            <button class="profile-btn" aria-label="Your profile">
             <svg viewBox="0 0 24 24" aria-hidden="true">
             <path d="M12 12a4 4 0 1 0-4-4a4 4 0 0 0 4 4Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z" fill="currentColor"/>
               circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
             </svg>
             </button>


        </div>


    </div>
</body>

</html>
